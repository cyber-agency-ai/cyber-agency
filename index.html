<style>
  :root{--bg:#060608;--surface:#0D0D12;--border:#1C1C26;--accent:#C8D0E0;--bright:#E8EDF5;--silver:#A8B4C8;--text:#E8EDF5;--muted:#505868;--muted2:#7080A0;--green:#60C890;--gold:#C8A040}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden;}
  .cursor{position:fixed;width:10px;height:10px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transition:transform .1s,width .2s,height .2s,background .2s;translate:-50% -50%;mix-blend-mode:difference}
  .cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(255,255,255,.6);border-radius:50%;pointer-events:none;z-index:9998;transition:all .18s;translate:-50% -50%;mix-blend-mode:difference}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,208,224,.024) 1px,transparent 1px),linear-gradient(90deg,rgba(200,208,224,.024) 1px,transparent 1px);background-size:72px 72px;pointer-events:none;z-index:0}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 56px;background:rgba(6,6,8,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
  .nav-logo{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center}
  .nav-logo span{color:var(--muted)}
  .nav-right{display:flex;align-items:center;gap:32px}
  nav ul{display:flex;gap:32px;list-style:none}
  nav ul a{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);text-decoration:none;letter-spacing:.12em;text-transform:uppercase;transition:color .2s;cursor:pointer}
  nav ul a:hover{color:var(--bright)}
  .nav-cta{background:var(--accent);color:var(--bg)!important;padding:10px 22px;transition:background .2s!important}
